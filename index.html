<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050a14" />
    <meta
      name="description"
      content="Meditative bioluminescent-trace explorer — sink into an abyssal sea, trace glowing routes past landmark anemones."
    />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bioluminescent Sea" />

    <!-- Open Graph + Twitter card — shareable preview. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bioluminescent Sea" />
    <meta
      property="og:description"
      content="Sink into an abyssal trench. Trace glowing routes past landmark creatures. Surface breathing easier than when you started."
    />
    <meta property="og:image" content="./og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bioluminescent Sea" />
    <meta
      name="twitter:description"
      content="Sink into an abyssal trench. Trace glowing routes past landmark creatures. Surface breathing easier than when you started."
    />
    <meta name="twitter:image" content="./og-image.svg" />

    <title>Bioluminescent Sea</title>

    <!--
      No meta-CSP here. Koota generates trait accessors dynamically
      for performance; PixiJS's default shader compiler does the same
      (the `pixi.js/unsafe-eval` import in main.tsx handles that
      side). Capacitor owns the strict CSP on mobile; the web build
      relies on the usual browser sandbox. Matches sibling
      mean-streets for consistency.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
