<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <title>Bioluminescent Sea</title>
  <!-- Rounded-rect background matching iOS icon mask (iOS masks to its own radius) -->
  <rect width="180" height="180" rx="40" ry="40" fill="#050a14" />

  <!-- Abyss gradient -->
  <defs>
    <radialGradient id="abyss" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0e4f55" stop-opacity="0.8" />
      <stop offset="55%" stop-color="#0a1a2e" stop-opacity="1" />
      <stop offset="100%" stop-color="#050a14" stop-opacity="1" />
    </radialGradient>
  </defs>
  <rect width="180" height="180" rx="40" ry="40" fill="url(#abyss)" />

  <!-- Glow halo -->
  <circle cx="90" cy="82" r="58" fill="#6be6c1" opacity="0.14" />
  <circle cx="90" cy="82" r="40" fill="#6be6c1" opacity="0.22" />

  <!-- Jellyfish bell -->
  <path
    d="M 42 88 Q 42 36 90 36 Q 138 36 138 88 Q 120 100 90 94 Q 60 100 42 88 Z"
    fill="#6be6c1"
    opacity="0.9"
  />

  <!-- Bell highlight -->
  <path
    d="M 60 60 Q 72 44 90 44 Q 108 44 120 60"
    stroke="#d9f2ec"
    stroke-width="4"
    fill="none"
    opacity="0.55"
    stroke-linecap="round"
  />

  <!-- Tentacles -->
  <g stroke="#6be6c1" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.82">
    <path d="M 58 88 Q 54 120 62 150" />
    <path d="M 76 94 Q 72 130 82 156" />
    <path d="M 90 94 Q 92 138 84 160" />
    <path d="M 104 94 Q 108 130 98 156" />
    <path d="M 122 88 Q 126 120 118 150" />
  </g>
</svg>
