<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <title>Bioluminescent Sea</title>

  <defs>
    <!-- Abyss gradient left-to-right then top-to-bottom -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4f55" stop-opacity="0.6" />
      <stop offset="45%" stop-color="#0a1a2e" />
      <stop offset="100%" stop-color="#050a14" />
    </linearGradient>

    <radialGradient id="glow" cx="32%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#6be6c1" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#6be6c1" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#6be6c1" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sea)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Layered ridges -->
  <path d="M 0 430 Q 300 390 600 440 Q 900 490 1200 420 L 1200 630 L 0 630 Z"
        fill="#061018" opacity="0.65" />
  <path d="M 0 490 Q 300 460 600 500 Q 900 540 1200 490 L 1200 630 L 0 630 Z"
        fill="#03080f" opacity="0.85" />

  <!-- Jellyfish cluster, left side -->
  <g transform="translate(260, 320)">
    <circle r="130" fill="#6be6c1" opacity="0.08" />
    <path
      d="M -80 0 Q -80 -95 0 -95 Q 80 -95 80 0 Q 60 16 0 10 Q -60 16 -80 0 Z"
      fill="#6be6c1" opacity="0.9"
    />
    <path
      d="M -50 -55 Q -20 -75 0 -75 Q 20 -75 50 -55"
      stroke="#d9f2ec" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"
    />
    <g stroke="#6be6c1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8">
      <path d="M -55 5 Q -58 60 -52 130" />
      <path d="M -25 12 Q -28 80 -22 150" />
      <path d="M 0 12 Q 4 95 -6 160" />
      <path d="M 25 12 Q 28 80 20 150" />
      <path d="M 55 5 Q 60 60 54 130" />
    </g>
  </g>

  <!-- Small accent jellyfish far right -->
  <g transform="translate(990, 180)" opacity="0.6">
    <path d="M -35 0 Q -35 -42 0 -42 Q 35 -42 35 0 Q 24 8 0 5 Q -24 8 -35 0 Z" fill="#6be6c1" />
    <g stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M -20 4 Q -22 32 -18 70" />
      <path d="M 0 6 Q 2 40 -2 80" />
      <path d="M 20 4 Q 22 32 18 70" />
    </g>
  </g>

  <!-- Floating plankton dots -->
  <g fill="#6be6c1">
    <circle cx="560" cy="160" r="4" opacity="0.7" />
    <circle cx="720" cy="90" r="3" opacity="0.55" />
    <circle cx="860" cy="320" r="5" opacity="0.6" />
    <circle cx="1100" cy="260" r="3" opacity="0.4" />
    <circle cx="120" cy="90" r="3" opacity="0.5" />
  </g>

  <!-- Title -->
  <text x="560" y="260"
        font-family="'Cormorant Garamond', Palatino, serif"
        font-weight="500"
        font-size="104"
        fill="#6be6c1"
        letter-spacing="2">
    Bioluminescent Sea
  </text>

  <!-- Tagline -->
  <text x="560" y="320"
        font-family="Inter, system-ui, sans-serif"
        font-size="28"
        fill="#d9f2ec"
        opacity="0.82">
    Sink into an abyssal trench. Trace glowing routes past landmark
  </text>
  <text x="560" y="358"
        font-family="Inter, system-ui, sans-serif"
        font-size="28"
        fill="#d9f2ec"
        opacity="0.82">
    creatures. Surface breathing easier than when you started.
  </text>
</svg>
