<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Bioluminescent Sea</title>
  <!-- Deep background disk -->
  <rect width="64" height="64" fill="#050a14" />
  <circle cx="32" cy="32" r="30" fill="#0a1a2e" />

  <!-- Soft glow halo behind the jellyfish -->
  <circle cx="32" cy="28" r="18" fill="#6be6c1" opacity="0.12" />
  <circle cx="32" cy="28" r="12" fill="#6be6c1" opacity="0.18" />

  <!-- Jellyfish bell -->
  <path
    d="M 16 30 Q 16 14 32 14 Q 48 14 48 30 Q 42 34 32 32 Q 22 34 16 30 Z"
    fill="#6be6c1"
    opacity="0.85"
  />

  <!-- Bell highlight -->
  <path
    d="M 22 22 Q 26 17 32 17 Q 38 17 42 22"
    stroke="#d9f2ec"
    stroke-width="1.6"
    fill="none"
    opacity="0.55"
    stroke-linecap="round"
  />

  <!-- Tentacles -->
  <path d="M 22 30 Q 21 40 23 50" stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8" />
  <path d="M 28 32 Q 27 44 30 54" stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8" />
  <path d="M 32 32 Q 33 46 30 56" stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8" />
  <path d="M 36 32 Q 37 44 34 54" stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8" />
  <path d="M 42 30 Q 43 40 41 50" stroke="#6be6c1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8" />
</svg>
