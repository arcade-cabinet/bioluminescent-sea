<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <title>Bioluminescent Sea foreground</title>
  <!-- Transparent background; system paints @color/ic_launcher_background.
       Adaptive safe zone is the inner ~66% (a 72-radius circle centered).
       Everything below fits inside that safe zone. -->

  <!-- Soft glow halo -->
  <circle cx="54" cy="50" r="24" fill="#6be6c1" opacity="0.14" />
  <circle cx="54" cy="50" r="16" fill="#6be6c1" opacity="0.22" />

  <!-- Jellyfish bell -->
  <path
    d="M 34 53 Q 34 29 54 29 Q 74 29 74 53 Q 66 58 54 55 Q 42 58 34 53 Z"
    fill="#6be6c1"
    opacity="0.88"
  />

  <!-- Bell highlight -->
  <path
    d="M 42 40 Q 47 33 54 33 Q 61 33 66 40"
    stroke="#d9f2ec"
    stroke-width="2.2"
    fill="none"
    opacity="0.55"
    stroke-linecap="round"
  />

  <!-- Tentacles — longer and wavier than the favicon since we have room -->
  <path d="M 41 54 Q 40 68 42 82" stroke="#6be6c1" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.82" />
  <path d="M 48 56 Q 47 72 50 84" stroke="#6be6c1" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.82" />
  <path d="M 54 56 Q 55 74 51 86" stroke="#6be6c1" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.82" />
  <path d="M 60 56 Q 61 72 57 84" stroke="#6be6c1" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.82" />
  <path d="M 67 54 Q 68 68 65 82" stroke="#6be6c1" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.82" />
</svg>
